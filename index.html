<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innocent Junior</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: #17202a;
            background: linear-gradient(135deg, #dff6ff, #f7e9ff);
        }

        .name-card {
            width: min(90%, 520px);
            padding: 48px 32px;
            text-align: center;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(23, 32, 42, 0.14);
        }

        .name-card p {
            margin-bottom: 12px;
            font-size: 18px;
            color: #607080;
        }

        .name-card h1 {
            font-size: clamp(36px, 8vw, 64px);
            line-height: 1.05;
            color: #1f4f8b;
        }
    </style>
</head>
<body>
    <main class="name-card">
        <p>Hello, I'm</p>
        <h1>Innocent Junior</h1>
    </main>
</body>
</html>
